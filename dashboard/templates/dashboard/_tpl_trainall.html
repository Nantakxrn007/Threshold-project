<template id="tpl-trainall">
<div class="tab-panel-tpl">
  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px;">
    <div class="card" style="flex:0 0 260px;padding:14px;">
      <div class="section-title" style="margin-bottom:10px;">⚙ Hyperparams</div>
      <div class="form-group"><label class="form-label">seq_len</label>
        <input type="number" id="ta-seq-len" value="10" min="5" max="50" style="width:100%"></div>
      <div class="form-group"><label class="form-label">Epochs</label>
        <input type="number" id="ta-epochs" value="30" min="5" max="200" step="5" style="width:100%"></div>
      <div class="form-group"><label class="form-label">Hidden</label>
        <select id="ta-hidden">
          <option value="8">8</option><option value="16" selected>16</option>
          <option value="32">32</option><option value="64">64</option>
        </select></div>
      <div class="form-group"><label class="form-label">Layers</label>
        <select id="ta-layers">
          <option value="1" selected>1</option><option value="2">2</option><option value="3">3</option>
        </select></div>
      <div class="form-group"><label class="form-label">LR</label>
        <input type="number" id="ta-lr" value="0.005" step="0.0005" min="0.0001" style="width:100%"></div>
      <div class="form-group"><label class="form-label">Batch Size</label>
        <select id="ta-batch">
          <option value="32">32</option><option value="64" selected>64</option><option value="128">128</option>
        </select></div>
      <div class="form-group"><label class="form-label">EWMA α</label>
        <input type="number" id="ta-ewma" value="0.3" step="0.05" min="0.01" max="1" style="width:100%"></div>
      <button class="btn btn-primary" id="ta-btn-train" onclick="startTrainAll()">🏋️ Train All Models</button>
      <div id="ta-msg" style="font-size:0.73rem;color:var(--text-2);font-family:'JetBrains Mono',monospace;margin-top:6px;min-height:18px;"></div>

      <div class="divider" style="margin:10px 0;"></div>

      <!-- Device info + Clear cache -->
      <div style="font-size:0.68rem;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;">System</div>
      <div id="ta-device-badge" style="font-size:0.7rem;font-family:'JetBrains Mono',monospace;padding:4px 8px;border-radius:4px;background:var(--bg-2);border:1px solid var(--border);color:var(--text-2);margin-bottom:8px;">
        ⏳ detecting…
      </div>
      <button onclick="taClearCache()" style="width:100%;padding:7px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);font-size:0.75rem;cursor:pointer;color:var(--text-2);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;" title="ล้าง job results เก่าออกจาก memory">
        🗑 Clear Cache
      </button>
      <div id="ta-clear-msg" style="font-size:0.68rem;color:var(--green);font-family:'JetBrains Mono',monospace;margin-top:4px;min-height:14px;"></div>
      <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
        <button onclick="taClearCache()"
                style="width:100%;padding:6px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);font-size:0.72rem;cursor:pointer;color:var(--text-3);">
          🗑 Clear cache (คืน RAM)
        </button>
        <div id="ta-clear-msg" style="font-size:0.68rem;color:var(--text-3);margin-top:4px;font-family:'JetBrains Mono',monospace;min-height:14px;"></div>
      </div>
    </div>

    <div class="card" style="flex:1;min-width:0;padding:14px;">
      <div class="section-title" style="margin-bottom:10px;">Training Progress</div>
      <table style="width:100%;border-collapse:collapse;font-size:0.8rem;">
        <thead>
          <tr style="border-bottom:1px solid var(--border);">
            <th style="text-align:left;padding:4px 8px;color:var(--text-3);font-weight:500;">Model</th>
            <th style="padding:4px 8px;color:var(--text-3);font-weight:500;">Status</th>
            <th style="padding:4px 8px;color:var(--text-3);font-weight:500;min-width:120px;">Progress</th>
            <th style="padding:4px 8px;color:var(--text-3);font-weight:500;">Loss</th>
          </tr>
        </thead>
        <tbody id="ta-progress-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="ta-pca-section" style="display:none">
    <div class="card" style="margin-bottom:12px;padding:14px;">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap;">
        <div class="section-title" style="margin:0;">🧬 PCA Latent Space — All Models</div>
        <div class="form-group" style="margin:0;min-width:150px;">
          <label class="form-label">Color by</label>
          <select id="ta-color" onchange="loadAllPcas()">
            <option value="run">Run ID</option>
            <option value="type">Normal / Anomaly</option>
          </select>
        </div>
      </div>
      <div id="ta-pca-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;"></div>
    </div>

    <div class="card" style="padding:14px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
        <div class="section-title" style="margin:0;">🔍 Error + Threshold Inspector</div>
        <div class="form-group" style="margin:0;min-width:160px;">
          <label class="form-label">Model</label>
          <select id="ta-inspect-model" onchange="loadModelError()"></select>
        </div>
        <div class="form-group" style="margin:0;min-width:140px;">
          <label class="form-label">Run</label>
          <select id="ta-inspect-run" onchange="loadModelError()">
            {% for r in all_runs %}<option value="{{ r }}"{% if forloop.first %} selected{% endif %}>{{ r }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div id="ta-inspect-raw" style="margin-bottom:8px;"></div>
      <div id="ta-inspect-err"></div>
    </div>
  </div>
</div>
</template>
