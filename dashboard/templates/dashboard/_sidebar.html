<!-- ── Sidebar ─────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">⚙ Model Config</div>

        <div class="form-group">
          <label class="form-label">Architecture</label>
          <select id="model-type">
            {% for m in model_choices %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
          </select>
        </div>

        <div class="form-group">
          <div class="range-row">
            <label class="form-label" style="margin:0">Window (seq_len)</label>
            <span class="range-val" id="seq-val">10</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <input type="range" id="seq-len" min="5" max="200" value="10" style="flex:1;"
                   oninput="document.getElementById('seq-val').textContent=this.value;document.getElementById('seq-len-n').value=this.value">
            <input type="number" id="seq-len-n" value="10" min="1" step="1"
                   style="width:52px;font-size:0.72rem;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;"
                   oninput="document.getElementById('seq-len').value=this.value;document.getElementById('seq-val').textContent=this.value">
          </div>
        </div>

        <div class="form-group">
          <div class="range-row">
            <label class="form-label" style="margin:0">Epochs</label>
            <span class="range-val" id="epochs-val">30</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <input type="range" id="epochs" min="5" max="500" step="5" value="30" style="flex:1;"
                   oninput="document.getElementById('epochs-val').textContent=this.value;document.getElementById('epochs-n').value=this.value">
            <input type="number" id="epochs-n" value="30" min="1" step="5"
                   style="width:52px;font-size:0.72rem;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;"
                   oninput="document.getElementById('epochs').value=this.value;document.getElementById('epochs-val').textContent=this.value">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Hidden Size</label>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="sidebar-chip sid-on" onclick="sidChip(this,'hidden')">16</span>
            <span class="sidebar-chip" onclick="sidChip(this,'hidden')">32</span>
            <span class="sidebar-chip" onclick="sidChip(this,'hidden')">64</span>
            <span class="sidebar-chip" onclick="sidChip(this,'hidden')">128</span>
          </div>
          <input type="number" id="hidden" value="16" min="1" step="8"
                 style="width:80px;font-size:0.75rem;" placeholder="custom"
                 oninput="sidSyncChips(this,'hidden')">
        </div>

        <div class="form-group">
          <label class="form-label">Layers</label>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="sidebar-chip sid-on" onclick="sidChip(this,'layers')">1</span>
            <span class="sidebar-chip" onclick="sidChip(this,'layers')">2</span>
            <span class="sidebar-chip" onclick="sidChip(this,'layers')">3</span>
          </div>
          <input type="number" id="layers" value="1" min="1" max="8" step="1"
                 style="width:80px;font-size:0.75rem;" placeholder="custom"
                 oninput="sidSyncChips(this,'layers')">
        </div>

        <div class="form-group">
          <label class="form-label">Learning Rate</label>
          <input type="number" id="lr" value="0.005" step="0.0005" min="0.0001">
        </div>

        <div class="form-group">
          <label class="form-label">Batch Size</label>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="sidebar-chip" onclick="sidChip(this,'batch')">32</span>
            <span class="sidebar-chip sid-on" onclick="sidChip(this,'batch')">64</span>
            <span class="sidebar-chip" onclick="sidChip(this,'batch')">128</span>
            <span class="sidebar-chip" onclick="sidChip(this,'batch')">256</span>
          </div>
          <input type="number" id="batch" value="64" min="1" step="16"
                 style="width:80px;font-size:0.75rem;" placeholder="custom"
                 oninput="sidSyncChips(this,'batch')">
        </div>

        <div class="form-group">
          <div class="range-row">
            <label class="form-label" style="margin:0">EWMA Alpha</label>
            <span class="range-val" id="ewma-val">0.3</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <input type="range" id="ewma" min="0.01" max="1" step="0.01" value="0.3" style="flex:1;"
                   oninput="document.getElementById('ewma-val').textContent=parseFloat(this.value).toFixed(2);document.getElementById('ewma-n').value=parseFloat(this.value).toFixed(2)">
            <input type="number" id="ewma-n" value="0.3" min="0.001" max="1" step="0.01"
                   style="width:52px;font-size:0.72rem;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;"
                   oninput="document.getElementById('ewma').value=this.value;document.getElementById('ewma-val').textContent=parseFloat(this.value).toFixed(2)">
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-train" onclick="startTraining()">🔥 Train Model</button>
      <div id="train-msg"></div>
      <div class="divider"></div>

      <!-- ── Error Aggregation + Labels ───────────────────────── -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">📊 Error Settings</div>

        <div class="form-group">
          <label class="form-label">Aggregation Method</label>
          <select id="agg-method" onchange="onAggChange()">
            <option value="mean">Mean (ค่าเฉลี่ย)</option>
            <option value="max" selected>Max (แนะนำ)</option>
            <option value="l2">L2 Norm</option>
          </select>
          <div style="font-size:0.68rem;color:var(--text-3);margin-top:4px;line-height:1.5;" id="agg-hint">
            Max — sensor ใดผิดปกติ โผล่ขึ้นทันที ไม่ถูก dilute
          </div>
        </div>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.78rem;color:var(--text-2);">
            <input type="checkbox" id="show-labels" checked
                   onchange="onLabelsChange()"
                   style="width:15px;height:15px;accent-color:var(--red);cursor:pointer;">
            แสดง Anomaly Labels
          </label>
        </div>
        <div style="font-size:0.68rem;color:var(--text-3);line-height:1.5;">
          แถบสีแดง = ground truth จาก dataset
        </div>
      </div>

      <div class="divider"></div>

      <div id="progress-section" style="display:none">
        <div class="form-label">Training Progress</div>
        <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <div id="progress-label" style="font-size:0.7rem;color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-top:4px;"></div>
        <div id="loss-chart" style="margin-top:8px;"></div>
      </div>
    </aside>
